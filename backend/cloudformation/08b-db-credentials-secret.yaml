AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secrets Manager secret for database credentials (used by RDS and ECS)'

Parameters:
  ProjectName:
    Type: String
    Default: bsp-blueprint
    Description: Project name for resource naming

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, uat, prod]
    Description: Environment name

  MasterUsername:
    Type: String
    Default: postgres
    Description: Database master username
    NoEcho: true

  MasterUserPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: Database master password (min 8 chars). Avoid quotes in password when using this template.

Resources:
  DBCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/db-credentials'
      Description: !Sub 'Database credentials for ${ProjectName} ${Environment}'
      SecretString: !Sub |
        {"username":"${MasterUsername}","password":"${MasterUserPassword}"}
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-db-credentials'
        - Key: Environment
          Value: !Ref Environment

Outputs:
  SecretArn:
    Description: ARN of the DB credentials secret
    Value: !Ref DBCredentialsSecret
    Export:
      Name: !Sub '${ProjectName}-${Environment}-DBCredentialsSecretArn'

  SecretName:
    Description: Name of the DB credentials secret
    Value: !Ref DBCredentialsSecret
    Export:
      Name: !Sub '${ProjectName}-${Environment}-DBCredentialsSecretName'
