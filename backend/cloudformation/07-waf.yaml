AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS WAF Web ACL with security rules'

Parameters:
  ProjectName:
    Type: String
    Default: bsp-blueprint
    Description: Project name for resource naming

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, uat, prod]
    Description: Environment name

  ALBArn:
    Type: String
    Default: ''
    Description: ALB ARN to associate with WAF (optional)

Resources:
  # IP Set for allowed IPs (optional - leave empty to allow all)
  AllowedIPSet:
    Type: AWS::WAFv2::IPSet
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-allowed-ips'
      Description: Allowed IP addresses
      Scope: REGIONAL
      IPAddressVersion: IPV4
      Addresses: []  # Add IP addresses here if needed, e.g., ['1.2.3.4/32']

  # Web ACL
  WebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-waf'
      Description: WAF Web ACL for application protection
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      Rules:
        # AWS Managed Rule - Core Rule Set
        # Exclude SizeRestrictions_BODY so multipart uploads (e.g. brand logo JPG/PNG/SVG)
        # can exceed the 8 KB ALB body limit; app enforces its own max (e.g. 10 MB for logos).
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
              ExcludedRules:
                - Name: SizeRestrictions_BODY
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: CommonRuleSetMetric

        # AWS Managed Rule - Known Bad Inputs
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: KnownBadInputsMetric

        # AWS Managed Rule - Linux Operating System Protection
        - Name: AWSManagedRulesLinuxRuleSet
          Priority: 3
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesLinuxRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: LinuxRuleSetMetric

        # AWS Managed Rule - SQL Injection Protection
        - Name: AWSManagedRulesSQLiRuleSet
          Priority: 4
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesSQLiRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: SQLiRuleSetMetric

        # Rate Limiting Rule
        - Name: RateLimitRule
          Priority: 5
          Statement:
            RateBasedStatement:
              Limit: 2000
              AggregateKeyType: IP
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitMetric

      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub '${ProjectName}-${Environment}-waf-metric'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-waf'
        - Key: Environment
          Value: !Ref Environment

  # Web ACL Association with ALB (if ALB ARN provided)
  WebACLAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Condition: HasALBArn
    Properties:
      ResourceArn: !Ref ALBArn
      WebACLArn: !GetAtt WebACL.Arn

Conditions:
  HasALBArn: !Not [!Equals [!Ref ALBArn, '']]

Outputs:
  WebACLId:
    Description: WAF Web ACL ID
    Value: !Ref WebACL
    Export:
      Name: !Sub '${ProjectName}-${Environment}-WebACLId'

  WebACLArn:
    Description: WAF Web ACL ARN
    Value: !GetAtt WebACL.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-WebACLArn'



